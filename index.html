  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        // Make sure sw.js is in the main folder, not assets!
        navigator.serviceWorker.register('sw.js');
      }

      const AD_UNIT_ID = "ca-app-pub-9911132333919550/5135171554"; 

      function watchAd() {
          if (window.AndroidBridge) {
              window.AndroidBridge.showRewardedAd(AD_UNIT_ID);
          } else {
              alert("Simulating Ad...");
              onAdFinished(); 
          }
      }

      function onAdFinished() {
          const ONE_HOUR = 60 * 60 * 1000;
          localStorage.setItem('harvestEnd', Date.now() + ONE_HOUR);
          alert("🚀 Auto-Harvest active for 1 hour!");
      }
    </script>
  </body>
